<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./src/assets/logo/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./src/assets/logo/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./src/assets/logo/favicon-16x16.png"
    />
    <link rel="manifest" href="./src/assets/logo/site.webmanifest" />

    <link rel="canonical" href="https://julien-bourbao.fr/" />

    <title>Julien Bourbao | Portfolio</title>
    <meta
      name="description"
      content="Portfolio de Julien Bourbao, développeur web. Découvrez mes projets, mon parcours et mes compétences en HTML, CSS, JavaScript, React et PHP."
    />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://julien-bourbao.fr/" />
    <meta property="og:title" content="Julien Bourbao | Portfolio" />
    <meta
      property="og:description"
      content="Portfolio de Julien Bourbao, développeur web. Découvrez mes projets, mon parcours et mes compétences en HTML, CSS, JavaScript, React et PHP."
    />
    <meta property="og:image" content="https://julien-bourbao.fr/og-image.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://julien-bourbao.fr/" />
    <meta name="twitter:title" content="Julien Bourbao | Portfolio" />
    <meta
      name="twitter:description"
      content="Portfolio de Julien Bourbao, développeur web. Découvrez mes projets, mon parcours et mes compétences en HTML, CSS, JavaScript, React et PHP."
    />
    <meta name="twitter:image" content="https://julien-bourbao.fr/og-image.jpg" />
  </head>
  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
